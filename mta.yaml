_schema-version: 3.3.0
ID: sap-invoice-resolution-agent
description: A simple CAP project.
version: 1.0.0
modules:
  - name: sap-invoice-resolution-agent-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: sap-invoice-resolution-agent-auth
      - name: sap-invoice-resolution-agent-db
      - name: sap-invoice-resolution-agent-destination
      - name: sap-invoice-resolution-agent-connectivity
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci
  - name: sap-invoice-resolution-agent-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: sap-invoice-resolution-agent-db
    parameters:
      buildpack: nodejs_buildpack
  - name: sap-invoice-resolution-agent
    type: approuter.nodejs
    path: app/router
    requires:
      - name: srv-api
        group: destinations
        properties:
          forwardAuthToken: true
          name: srv-api
          url: ~{srv-url}
      - name: sap-invoice-resolution-agent-auth
      - name: sap-invoice-resolution-agent-destination
      - name: sap-invoice-resolution-agent-html5-runtime
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}
    parameters:
      disk-quota: 256M
      keep-existing-routes: true
      memory: 256M
  - name: sap-invoice-resolution-agent-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: sap-invoice-resolution-agent-auth
      - name: srv-api
      - name: sap-invoice-resolution-agent-html5-repo-host
        parameters:
          config:
            HTML5Runtime_enabled: true
          content-target: true
    build-parameters:
      build-result: app/
      requires:
        - artifacts:
            - invoiceagentinvoiceworklist.zip
          name: invoiceagentinvoiceworklist
          target-path: app/
  - name: invoiceagentinvoiceworklist
    type: html5
    path: app/invoiceworklist
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms:
        []
resources:
  - name: sap-invoice-resolution-agent-auth
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509
          redirect-uris:
            - https://*~{app-api/app-uri}/**
        tenant-mode: dedicated
        xsappname: sap-invoice-resolution-agent-${org}-${space}
      path: ./xs-security.json
      service: xsuaa
      service-plan: application
    requires:
      - name: app-api
  - name: sap-invoice-resolution-agent-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: sap-invoice-resolution-agent-destination
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: false
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
            existing_destinations_policy: update
      service: destination
      service-plan: lite
  - name: sap-invoice-resolution-agent-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  - name: sap-invoice-resolution-agent-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
  - name: sap-invoice-resolution-agent-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
